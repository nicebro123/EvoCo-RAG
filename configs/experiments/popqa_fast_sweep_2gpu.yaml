# SpecFlow-style launcher spec for quick PopQA fast sweeps.
#
# Generate the local base config first:
#   python scripts/make_dataset_config.py --data-root ../rag_assets/rag_data/evoco_dataset_pack --all --output-root configs/local
#
# Dry run:
#   python scripts/launch_experiments.py --spec configs/experiments/popqa_fast_sweep_2gpu.yaml

study_name: evoco_popqa_fast_sweep_2gpu
output_root: ../rag_assets/outputs/experiments
checkpoint_root: ../rag_assets/checkpoints/experiments
base_config: configs/local/popqa_standard_fast.yaml

defaults:
  gpu: "2,3"
  seed: 42

experiments:
  - name: cost_top3

  - name: precision_top5
    overrides:
      contract.top_k: 5
      contract.max_selected_docs: 5
      runtime.candidate_doc_char_limit: 1200
      runtime.num_audit_candidates: 3
      runtime.audit_batch_size: 2

  - name: precision_top8
    overrides:
      contract.top_k: 8
      contract.max_selected_docs: 8
      runtime.candidate_doc_char_limit: 1600
      runtime.num_audit_candidates: 5
      runtime.audit_batch_size: 2

  - name: answer_only_reward
    overrides:
      ablation.use_decomposed_reward: false

  - name: no_audit
    overrides:
      ablation.use_evidence_audit: false
      runtime.num_audit_candidates: 1
