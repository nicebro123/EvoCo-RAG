# Full PopQA ablation study for the paper's main mechanism table.
#
# This study keeps the PopQA full split and 3 training rounds, then disables one
# EvoCo-RAG component at a time. The small model is a reranker; action-policy
# and policy-head ablations are intentionally not part of the mainline matrix.
#
# Generate local dataset configs first:
#   python scripts/make_dataset_config.py --data-root ../rag_assets/rag_data/evoco_dataset_pack --all --full --output-root configs/local
#
# Dry run:
#   python scripts/launch_experiments.py --spec configs/experiments/popqa_ablation_full_2gpu.yaml

study_name: evoco_popqa_ablation_full_2gpu_v3
output_root: ../rag_assets/outputs/experiments
checkpoint_root: ../rag_assets/checkpoints/experiments
base_config: configs/local/popqa_standard_full.yaml

defaults:
  gpu: "2,3"
  seed: 42

overrides:
  contract.top_k: 5
  contract.max_selected_docs: 5
  runtime.candidate_doc_char_limit: 1200
  runtime.num_audit_candidates: 3
  runtime.audit_batch_size: 2
  runtime.max_prompt_length: 3072
  runtime.max_completion_length: 1024
  runtime.progress_interval: 50
  runtime.replay_flush_interval: 10
  training.large_train_method: grpo
  training.grpo_num_generations: 2
  training.grpo_n_per_train: 1
  training.batch_size: 4
  training.large_batch_size: 2

experiments:
  - name: evoco_full

  - name: large_sft_only
    overrides:
      training.large_train_method: sft

  - name: answer_only_reward
    overrides:
      ablation.use_decomposed_reward: false

  - name: no_audit
    overrides:
      ablation.use_evidence_audit: false
      runtime.num_audit_candidates: 1

  - name: small_only
    overrides:
      ablation.train_large_lora: false

  - name: large_only
    overrides:
      ablation.train_small_lora: false

  - name: baseline_no_audit_answer_only
    overrides:
      ablation.use_evidence_audit: false
      ablation.use_decomposed_reward: false
      ablation.train_large_lora: false
      runtime.num_audit_candidates: 1
